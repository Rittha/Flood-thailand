<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thailand Flood Intelligence Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="./styles.css" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA08taCfGr89y2QvFsT2E7TV42U8GvaYyA",
  authDomain: "flood-9875b.firebaseapp.com",
  projectId: "flood-9875b",
  storageBucket: "flood-9875b.firebasestorage.app",
  messagingSenderId: "208842355033",
  appId: "1:208842355033:web:2e91ea67b3913e5f5f5c48",
  measurementId: "G-1R0ZEQDFNV"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.firebaseAuth = auth;
    window.firebaseSignIn = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      await signInWithEmailAndPassword(auth, email, password,);
    };

    window.firebaseSignOut = async function () {
      await signOut(auth);
    };

    onAuthStateChanged(auth, async (user) => {
      const box = document.getElementById("authStatus");
      if (user) {
        box.textContent = `ล็อกอินแล้ว: ${user.email}`;
      } else {
        box.textContent = "ยังไม่ได้ล็อกอิน";
      }
      if (window.bootstrapApp) {
        window.bootstrapApp();
      }
    });
  </script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>🌊 Thailand Flood Intelligence Dashboard</h1>
      <p class="subtitle">Heatmap • Time-series • Prediction • By Rittha Pws.</p>
    </div>
    <div class="auth-panel">
      <div id="authStatus">ยังไม่ได้ล็อกอิน</div>
      <div class="auth-row">
        <input id="email" type="email" placeholder="email" />
        <input id="password" type="password" placeholder="password" />
        <button onclick="firebaseSignIn()">Login</button>
        <button onclick="firebaseSignOut()">Logout</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="controls card">
      <div class="control-group">
        <label for="provinceFilter">จังหวัด</label>
        <select id="provinceFilter">
          <option value="all">ทั้งหมด</option>
        </select>
      </div>

      <div class="control-group">
        <label for="viewMode">มุมมองแผนที่</label>
        <select id="viewMode">
          <option value="markers">Markers</option>
          <option value="heatmap">Heatmap</option>
          <option value="both">ทั้งคู่</option>
        </select>
      </div>

      <div class="control-group">
        <label for="daysSelect">กราฟย้อนหลัง</label>
        <select id="daysSelect">
          <option value="7" selected>7 วัน</option>
          <option value="14">14 วัน</option>
          <option value="30">30 วัน</option>
        </select>
      </div>

      <div class="control-buttons">
        <button id="refreshBtn">รีเฟรช</button>
        <button id="syncBtn" class="btn-secondary">Admin Sync</button>
      </div>
    </section>

    <section class="grid">
      <div class="card map-card">
        <div class="section-title">แผนที่น้ำท่วม</div>
        <div id="map"></div>
      </div>

      <div class="card">
        <div class="section-title">สถิติรายจังหวัด</div>
        <canvas id="provinceChart"></canvas>
      </div>

      <div class="card">
        <div class="section-title">แนวโน้มย้อนหลัง</div>
        <canvas id="trendChart"></canvas>
      </div>

      <div class="card">
        <div class="section-title">Flood Prediction</div>
        <div id="predictionList" class="list"></div>
      </div>

      <div class="card wide">
        <div class="section-title">รายการจุดน้ำท่วม</div>
        <div id="floodList" class="list"></div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
